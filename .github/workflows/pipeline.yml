name: Crypto Cloud Pipeline

on:
  schedule:
    - cron: '0 9 * * *' 
  workflow_dispatch:   

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas duckdb python-dotenv dbt-duckdb

      - name: Ejecutar Ingesta (Python)
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python extract_data.py

      - name: Install dbt Dependencies
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python -m dbt.cli.main deps --profiles-dir .

      - name: 🧪 Run Data Tests (CI)
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python -m dbt.cli.main test --profiles-dir .

      - name: 🚀 Deploy Transformations (CD)
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
        
        run: python -m dbt.cli.main run --profiles-dir . || true