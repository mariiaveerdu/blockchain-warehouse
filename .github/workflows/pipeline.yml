name: Crypto Cloud Pipeline

on:
  schedule:
    - cron: '0 9 * * *' 
  workflow_dispatch:   

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip uninstall dbt-core dbt-duckdb -y
          pip install requests pandas python-dotenv
          # Instalamos dbt-core explícitamente para asegurar la versión
          pip install dbt-core==1.8.2 dbt-duckdb==1.8.2 duckdb==1.4.4 --force-reinstall

      - name: Ejecutar Ingesta (Python)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python extract_data.py

      - name: Ejecutar dbt (Clean, Deps, Build)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          
          rm -rf dbt_packages
          
          # Usamos la ruta completa al ejecutable
          python -m dbt.cli.main clean --profiles-dir .
          python -m dbt.cli.main deps --profiles-dir .
          python -m dbt.cli.main build --profiles-dir .